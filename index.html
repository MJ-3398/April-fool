<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강민재 · Fool April 모바일 청첩장</title>

<style>
    body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: #faf9f7;
        color: #333;
    }

    .hero {
        width: 100%;
        height: 450px;
        background: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&w=900')
            center/cover no-repeat;
        position: relative;
    }

    .overlay {
        position: absolute;
        bottom: 40px;
        width: 100%;
        text-align: center;
        color: white;
        text-shadow: 0 2px 6px rgba(0,0,0,0.4);
        font-size: 28px;
        font-weight: 600;
    }

    .section {
        padding: 40px 22px;
        line-height: 1.7;
        text-align: center;
        background: #faf9f7;
    }

    .title {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 16px;
    }

    .names {
        font-size: 23px;
        font-weight: 500;
        margin-bottom: 14px;
    }

    .date-place {
        background: #ffffff;
        padding: 35px 18px;
        border-radius: 14px;
        margin: 30px 18px;
        font-size: 18px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .btn {
        display: block;
        margin: 22px auto;
        padding: 14px 18px;
        width: 80%;
        background: #5a6cff;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
    }

    .btn:active {
        opacity: 0.8;
    }

    .hidden {
        display: none;
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #d04f4f;
    }
</style>

<script>
    function showPrank() {
        document.getElementById("prank").style.display = "block";
    }
</script>
</head>

<body>

    <!-- 메인 이미지 -->
    <div class="hero">
        <div class="overlay">Wedding Invitation</div>
    </div>

    <!-- 인사말 -->
    <div class="section">
        <div class="title">초대합니다</div>
        따뜻한 봄날,<br>
        서로의 마음을 나누며<br>
        소중한 약속의 자리에 여러분을 초대합니다.
    </div>

    <!-- 이름 -->
    <div class="section">
        <div class="names">
            신랑 <b>강민재</b><br>
            신부 <b>Fool April</b>
        </div>
    </div>

    <!-- 날짜/장소 -->
    <div class="date-place">
        ✦ 2026년 4월 1일 화요일 오후 2시<br><br>
        ✦ 부산 해운대 블루포트웨딩 3층 아너스홀
    </div>

    <!-- 축의금 버튼 -->
    <a class="btn" onclick="showPrank()">축의금 계좌 보기</a>

    <!-- 만우절 반전 -->
    <div id="prank" class="hidden">
        🎉 만우절!<br>
        진짜 결혼 아니고 장난이야 😁  
    </div>

</body>
</html>
