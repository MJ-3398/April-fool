<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다</title>
<style>
  body {
    font-family: "Pretendard", sans-serif;
    margin: 0;
    background: #f7f5f2;
    color: #333;
    line-height: 1.6;
  }
  .hero {
    padding: 60px 20px;
    text-align: center;
    background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=60') center/cover no-repeat;
    color: white;
  }
  .hero h1 { font-size: 28px; margin: 0; }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
  }
  .section { margin: 30px 0; text-align: center; }
  .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
  .footer { text-align: center; font-size: 14px; color: #aaa; margin: 40px 0 20px; }
  .reveal {
    margin-top: 40px;
    padding: 15px;
    background: #eee;
    border-radius: 8px;
    font-size: 18px;
    display: none;
  }
  .btn {
    background: #c9a36b;
    color: white;
    padding: 12px 18px;
    border-radius: 6px;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>저희 결혼합니다</h1>
</div>

<div class="container">
  <div class="section">
    <div class="title">신랑 민재 · 신부 ㅇㅇ</div>
    <p>서로에 대한 믿음과 사랑을 바탕으로 평생을 함께하려 합니다.<br>소중한 분을 모시는 자리, 축복해 주시면 감사하겠습니다.</p>
  </div>

  <div class="section">
    <div class="title">일시</div>
    <p>2026년 4월 1일 (수)<br>오후 2시</p>
  </div>

  <div class="section">
    <div class="title">장소</div>
    <p>서울 ○○웨딩홀 3층 라운지홀</p>
  </div>

  <div class="section">
    <a href="#" class="btn" onclick="document.getElementById('prank').style.display='block'">축의금 안내</a>
  </div>

  <div id="prank" class="reveal">
    😄 만우절입니다. 진짜 결혼은 아닙니다. <br>놀라셨다면 미안하고, 그래도 한 번 웃으셨길!
  </div>

  <div class="footer">© 2026 Mobile Invitation</div>
</div>

</body>
</html>
